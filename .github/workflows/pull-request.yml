name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validate-pr-policy:
    name: Validate PR Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Ensure PR references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issuePattern = /(#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+)\b/i;
            const title = pr.title ?? "";
            const body = pr.body ?? "";

            if (pr.head.ref === "main") {
              core.setFailed("Pull requests must come from a feature branch, not main.");
              return;
            }

            if (/^\[CHORE\]/i.test(title)) {
              core.info("CHORE PR detected — skipping issue reference requirement.");
              return;
            }

            if (!issuePattern.test(`${title}\n${body}`)) {
              core.setFailed("Pull requests must reference a GitHub issue in the title or body, for example `Closes #123`.");
            }

  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    needs: validate-pr-policy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install invoke
        run: pip install invoke

      - name: Build, format, and lint
        run: inv build

      - name: Test
        run: inv test

      - name: Security audit (non-blocking)
        id: audit
        continue-on-error: true
        run: |
          set -o pipefail
          inv security 2>&1 | tee /tmp/audit-output.txt

      - name: Post audit results as PR comment
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditOutput = fs.readFileSync('/tmp/audit-output.txt', 'utf8');
            const body = `## 🔒 Security Audit Results\n\nThe audit found advisories:\n\n\`\`\`\n${auditOutput.slice(0, 10000)}\n\`\`\`\n\n*This is informational only — it does not block this PR.*`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });